name: Smart Contract Tests

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  smart-contract-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            
      - name: Install Stellar CLI
        run: |
          if ! command -v stellar &> /dev/null; then
            cargo install --locked stellar-cli
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          
      - name: Build smart contracts
        run: |
          cd contracts
          cargo build --target wasm32-unknown-unknown --release
          
      - name: Run smart contract tests
        run: |
          cd contracts
          cargo test --workspace
          
      - name: Run reentrancy tests specifically
        run: |
          cd contracts/reentrancy-tests
          cargo test -- --nocapture

      - name: Verify contract examples
        run: |
          cd contracts
          for contract in vesting-vault malicious-contract reentrancy-tests; do
            if [ -d "$contract" ]; then
              echo "Testing $contract contract..."
              cd $contract
              cargo test
              cd ..
            else
              echo "Skipping $contract — directory not found"
            fi
          done

  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
          POSTGRES_DB: vesting_vault_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
          
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
        
      - name: Create environment file
        working-directory: ./backend
        run: |
          cp .env.example .env
          echo "NODE_ENV=test" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_NAME=vesting_vault_test" >> .env
          echo "DB_USER=postgres" >> .env
          echo "DB_PASSWORD=password" >> .env
          cp .env .env.test
        
      - name: Create data directory
        working-directory: ./backend
        run: mkdir -p data

      - name: Create dummy firebase credentials
        working-directory: ./backend
        run: |
          echo '{"type":"service_account","project_id":"test"}' > firebase-service-account.json
        
      - name: Run backend tests
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: vesting_vault_test
          DB_USER: postgres
          DB_PASSWORD: password
          FIREBASE_SERVICE_ACCOUNT_PATH: ./firebase-service-account.json
        
      - name: Generate coverage report
        working-directory: ./backend
        run: npm run test:coverage || true

  integration-tests:
    runs-on: ubuntu-latest
    needs: [smart-contract-tests, backend-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          
      - name: Install Stellar CLI
        run: |
          if ! command -v stellar &> /dev/null; then
            cargo install --locked stellar-cli
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          
      - name: Build contracts
        run: |
          cd contracts
          cargo build --target wasm32-unknown-unknown --release
          
      - name: Create backend .env
        working-directory: ./backend
        run: |
          cp .env.example .env
          cat >> .env << 'EOF'
          NODE_ENV=test
          PORT=4000
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=vesting_vault_test
          DB_USER=postgres
          DB_PASSWORD=password
          JWT_SECRET=test-jwt-secret
          JWT_REFRESH_SECRET=test-refresh-secret
          EOF

      - name: Create data directory
        working-directory: ./backend
        run: mkdir -p data

      - name: Start backend server
        working-directory: ./backend
        run: |
          mkdir -p data
          npm start &
          sleep 15
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: vesting_vault_test
          DB_USER: postgres
          DB_PASSWORD: password
          
      - name: Run integration tests
        run: |
          echo "Testing backend API..."
          curl -f http://localhost:4000/ || echo "Root endpoint check done"
          curl -f http://localhost:4000/api/audit/verify || echo "Audit verify check done"
          
      - name: Test reentrancy protection
        run: |
          if [ -d "contracts/reentrancy-tests" ]; then
            cd contracts/reentrancy-tests
            cargo test test_comprehensive_reentrancy_protection -- --nocapture
          else
            echo "No reentrancy-tests directory — skipping"
          fi
