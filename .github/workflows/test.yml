name: Lumina-etwork Tests

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: "Lint & Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check for syntax errors
        working-directory: backend
        run: node --check src/index.js

      - name: Run npm audit (high severity)
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev || true

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vesting_vault_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
          
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
        
      - name: Create environment file
        working-directory: ./backend
        run: |
          cp .env.example .env
          echo "DB_HOST=localhost"     >> .env
          echo "DB_PORT=5432"         >> .env
          echo "DB_NAME=vesting_vault_test" >> .env
          echo "DB_USER=postgres"     >> .env
          echo "DB_PASSWORD=password" >> .env
          echo "JWT_SECRET=test-jwt-secret" >> .env
          echo "JWT_REFRESH_SECRET=test-refresh-secret" >> .env
          echo "TRANSPARENCY_PRIVATE_KEY=test-transparency-private-key" >> .env
          echo "TRANSPARENCY_PUBLIC_KEY=test-transparency-public-key" >> .env
          cp .env .env.test
        
      - name: Create data directory
        working-directory: ./backend
        run: mkdir -p data
        
      - name: Run backend tests
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: vesting_vault_test
          DB_USER: postgres
          DB_PASSWORD: password
        
      - name: Generate coverage report
        working-directory: ./backend
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: vesting_vault_test
          DB_USER: postgres
          DB_PASSWORD: password
