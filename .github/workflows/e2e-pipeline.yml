name: "E2E Pipeline — Green Light Gate"

on:
  push:
    branches: [main, develop, "feature/*", "release/*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_contracts:
        description: 'Skip smart contract tests (faster iteration)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: stable

jobs:
  lint:
    name: "Lint & Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check for syntax errors
        working-directory: backend
        run: node --check src/index.js

      - name: Run npm audit (high severity)
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev || true

  unit-tests:
    name: "Backend Unit Tests"
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vesting_vault_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Create .env for tests
        working-directory: backend
        run: |
          cp .env.example .env
          cat >> .env << 'EOF'
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=vesting_vault_test
          DB_USER=postgres
          DB_PASSWORD=password
          NODE_ENV=test
          JWT_SECRET=test-jwt-secret-e2e-pipeline
          JWT_REFRESH_SECRET=test-refresh-secret-e2e-pipeline
          EOF
          cp .env .env.test

      - name: Create data directory
        working-directory: backend
        run: mkdir -p data

      - name: Create dummy firebase credentials
        working-directory: backend
        run: |
          echo '{"type":"service_account","project_id":"test"}' > firebase-service-account.json

      - name: Run Jest unit tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: vesting_vault_test
          FIREBASE_SERVICE_ACCOUNT_PATH: ./firebase-service-account.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: backend/coverage/
          retention-days: 7

  contract-tests:
    name: "Soroban Smart Contract Tests"
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ github.event.inputs.skip_contracts != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Stellar CLI
        run: |
          if ! command -v stellar &> /dev/null; then
            cargo install --locked stellar-cli
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build vesting-vault contract
        run: |
          cd contracts/vesting-vault
          cargo build --target wasm32-unknown-unknown --release

      - name: Run contract unit tests
        run: |
          cd contracts/vesting-vault
          cargo test -- --nocapture

      - name: Run reentrancy protection tests
        run: |
          if [ -d "contracts/reentrancy-tests" ]; then
            cd contracts/reentrancy-tests
            cargo test test_comprehensive_reentrancy_protection -- --nocapture
          else
            echo "No reentrancy-tests directory — skipping"
          fi

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: vesting-vault-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  e2e-tests:
    name: "E2E User Journey (Cypress + Stellar Quickstart)"
    runs-on: ubuntu-latest
    needs: [unit-tests, contract-tests]
    if: |
      always() &&
      needs.unit-tests.result == 'success' &&
      (needs.contract-tests.result == 'success' || needs.contract-tests.result == 'skipped')

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vesting_vault
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Create backend .env for E2E
        working-directory: backend
        run: |
          cp .env.example .env
          cat >> .env << 'EOF'
          NODE_ENV=e2e
          PORT=4000
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=vesting_vault
          DB_USER=postgres
          DB_PASSWORD=password
          JWT_SECRET=e2e-test-jwt-secret-not-for-production
          JWT_REFRESH_SECRET=e2e-test-refresh-secret-not-for-production
          EOF

      - name: Create data directory
        working-directory: backend
        run: mkdir -p data

      - name: Start backend server
        working-directory: backend
        run: |
          npm start &
          echo "Backend PID: $!"
        env:
          NODE_ENV: e2e
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: vesting_vault
          PORT: 4000
          JWT_SECRET: e2e-test-jwt-secret-not-for-production
          JWT_REFRESH_SECRET: e2e-test-refresh-secret-not-for-production

      - name: Wait for backend
        run: |
          echo "Waiting for backend at http://localhost:4000/health…"
          for i in $(seq 1 40); do
            if curl -sf http://localhost:4000/health 2>/dev/null | grep -q '"status":"OK"'; then
              echo "Backend is ready (attempt $i)"
              break
            fi
            echo "Attempt $i/40…"
            sleep 3
          done

      - name: Run basic API smoke test
        run: |
          curl -sf http://localhost:4000/health || echo "Health endpoint not available"

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: /tmp/e2e-results/
          retention-days: 7

  green-light:
    name: "GREEN LIGHT — Deployment Approved"
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, contract-tests, e2e-tests]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.unit-tests.result == 'success' &&
      (needs.contract-tests.result == 'success' || needs.contract-tests.result == 'skipped') &&
      needs.e2e-tests.result == 'success'

    steps:
      - name: All gates passed — Green Light
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║                                                      ║"
          echo "║   ✅  GREEN LIGHT — Deployment Approved              ║"
          echo "║                                                      ║"
          echo "║   All quality gates passed:                          ║"
          echo "║   ✓ Lint & Static Analysis                           ║"
          echo "║   ✓ Backend Unit Tests                               ║"
          echo "║   ✓ Soroban Smart Contract Tests                     ║"
          echo "║   ✓ E2E User Journey                                 ║"
          echo "║                                                      ║"
          echo "║   Branch: ${{ github.ref_name }}"
          echo "║   Commit: ${{ github.sha }}"
          echo "║   Run:    ${{ github.run_id }}"
          echo "╚══════════════════════════════════════════════════════╝"

  red-light:
    name: "RED LIGHT — Deployment Blocked"
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, contract-tests, e2e-tests]
    if: |
      always() && (
        needs.lint.result == 'failure' ||
        needs.unit-tests.result == 'failure' ||
        needs.contract-tests.result == 'failure' ||
        needs.e2e-tests.result == 'failure'
      )

    steps:
      - name: Report blocking failures
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║                                                      ║"
          echo "║   🔴  RED LIGHT — Deployment Blocked                 ║"
          echo "║                                                      ║"
          echo "║   One or more quality gates failed.                  ║"
          echo "║   Fix failing jobs before deploying.                 ║"
          echo "║                                                      ║"
          echo "║   Lint:      ${{ needs.lint.result }}"
          echo "║   Unit:      ${{ needs.unit-tests.result }}"
          echo "║   Contracts: ${{ needs.contract-tests.result }}"
          echo "║   E2E:       ${{ needs.e2e-tests.result }}"
          echo "╚══════════════════════════════════════════════════════╝"
          exit 1
