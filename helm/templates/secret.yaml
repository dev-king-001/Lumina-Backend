apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vesting-vault-backend.fullname" . }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "vesting-vault-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
