apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vesting-vault-backend.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "vesting-vault-backend.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
