apiVersion: v1
kind: Service
metadata:
  name: {{ include "vesting-vault-backend.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "vesting-vault-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "vesting-vault-backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
